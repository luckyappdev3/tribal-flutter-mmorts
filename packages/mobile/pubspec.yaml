name: mobile_client
description: Client mobile pour le MMORTS Persistant.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation & Injection
  go_router: ^13.2.0
  get_it: ^7.6.7
  
  # État
  flutter_bloc: ^8.1.5
  
  # Réseau & API
  dio: ^5.4.0
  socket_io_client: ^2.0.3
  
  # Stockage local
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # UI & Images
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets requis par ton arborescence
  assets:
    - assets/game-data/buildings/
    - assets/game-data/units/